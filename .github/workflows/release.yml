name: Release Plugin

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MODEL_BUNDLE_URL: https://github.com/miaotouy/aiohub-paddle-ocr/releases/download/modelsv1/aiohub-paddle-ocr-models-ppocr-v5-mobile-v1.tar.gz
  MODEL_BUNDLE_SHA256: 2615c35c0aa33bb4ea21ec8a1de6a33cc8823d68d524f36f0e3cbb17777d63de

jobs:
  build:
    name: Build ${{ matrix.package-target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-target: windows-x64
            rust-target: x86_64-pc-windows-msvc
            os: windows-latest
          - package-target: windows-arm64
            rust-target: aarch64-pc-windows-msvc
            os: windows-11-arm
          - package-target: macos-x64
            rust-target: x86_64-apple-darwin
            os: macos-15-intel
          - package-target: macos-arm64
            rust-target: aarch64-apple-darwin
            os: macos-latest
          - package-target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - package-target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: bun install

      - name: Download and verify OCR models
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Invoke-WebRequest -Uri $env:MODEL_BUNDLE_URL -OutFile model-bundle.tar.gz

          $actualHash = (Get-FileHash -Algorithm SHA256 -Path model-bundle.tar.gz).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:MODEL_BUNDLE_SHA256) {
            throw "Model bundle SHA256 mismatch. Expected $env:MODEL_BUNDLE_SHA256, got $actualHash."
          }

          tar -xzf model-bundle.tar.gz

          if (-not (Test-Path -Path "models/ppocr-v5-mobile")) {
            throw "Model bundle did not extract models/ppocr-v5-mobile."
          }

          if (-not (Test-Path -Path "SHA256SUMS.txt")) {
            throw "Model bundle is missing SHA256SUMS.txt."
          }

          $badFiles = @()
          foreach ($line in Get-Content -Path "SHA256SUMS.txt") {
            if ([string]::IsNullOrWhiteSpace($line)) {
              continue
            }

            $parts = $line -split "\s+", 2
            if ($parts.Count -ne 2) {
              $badFiles += "invalid checksum line: $line"
              continue
            }

            $expected = $parts[0]
            $relativePath = $parts[1]
            $localPath = $relativePath -replace "/", [System.IO.Path]::DirectorySeparatorChar

            if (-not (Test-Path -LiteralPath $localPath)) {
              $badFiles += "missing: $relativePath"
              continue
            }

            $fileHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $localPath).Hash.ToLowerInvariant()
            if ($fileHash -ne $expected) {
              $badFiles += "mismatch: $relativePath"
            }
          }

          if ($badFiles.Count -gt 0) {
            $badFiles | ForEach-Object { Write-Error $_ }
            throw "Model file checksum verification failed."
          }

          Get-ChildItem -Path "models/ppocr-v5-mobile" -File

      - name: Package plugin
        run: bun build.js --release --package --target=${{ matrix.package-target }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddle-ocr-${{ matrix.package-target }}
          path: paddle-ocr-v*-${{ matrix.package-target }}.zip
          if-no-files-found: error

  release:
    name: Upload GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload plugin ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
