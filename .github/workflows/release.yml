name: Release Plugin

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MODEL_BUNDLE_URL: https://github.com/miaotouy/aiohub-paddle-ocr/releases/download/modelsv1/aiohub-paddle-ocr-models-ppocr-v5-mobile-v1.tar.gz
  MODEL_BUNDLE_SHA256: 2615c35c0aa33bb4ea21ec8a1de6a33cc8823d68d524f36f0e3cbb17777d63de

jobs:
  build:
    name: Build ${{ matrix.package-target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-target: windows-x64
            rust-target: x86_64-pc-windows-msvc
            os: windows-latest
            gpu: false
          - package-target: windows-x64
            rust-target: x86_64-pc-windows-msvc
            os: windows-latest
            gpu: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: bun install

      - name: Download and verify OCR models
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Invoke-WebRequest -Uri $env:MODEL_BUNDLE_URL -OutFile model-bundle.tar.gz

          $actualHash = (Get-FileHash -Algorithm SHA256 -Path model-bundle.tar.gz).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:MODEL_BUNDLE_SHA256) {
            throw "Model bundle SHA256 mismatch. Expected $env:MODEL_BUNDLE_SHA256, got $actualHash."
          }

          tar -xzf model-bundle.tar.gz

          if (-not (Test-Path -Path "models/ppocr-v5-mobile")) {
            throw "Model bundle did not extract models/ppocr-v5-mobile."
          }

          if (-not (Test-Path -Path "SHA256SUMS.txt")) {
            throw "Model bundle is missing SHA256SUMS.txt."
          }

          $badFiles = @()
          foreach ($line in Get-Content -Path "SHA256SUMS.txt") {
            if ([string]::IsNullOrWhiteSpace($line)) {
              continue
            }

            $parts = $line -split "\s+", 2
            if ($parts.Count -ne 2) {
              $badFiles += "invalid checksum line: $line"
              continue
            }

            $expected = $parts[0]
            $relativePath = $parts[1]
            $localPath = $relativePath -replace "/", [System.IO.Path]::DirectorySeparatorChar

            if (-not (Test-Path -LiteralPath $localPath)) {
              $badFiles += "missing: $relativePath"
              continue
            }

            $fileHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $localPath).Hash.ToLowerInvariant()
            if ($fileHash -ne $expected) {
              $badFiles += "mismatch: $relativePath"
            }
          }

          if ($badFiles.Count -gt 0) {
            $badFiles | ForEach-Object { Write-Error $_ }
            throw "Model file checksum verification failed."
          }

          Get-ChildItem -Path "models/ppocr-v5-mobile" -File

      - name: Package plugin
        shell: pwsh
        run: |
          if ("${{ matrix.gpu }}" -eq "true") {
            bun build.js --release --package --target=${{ matrix.package-target }} --gpu
          } else {
            bun build.js --release --package --target=${{ matrix.package-target }}
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddle-ocr-${{ matrix.package-target }}-${{ matrix.gpu && 'gpu' || 'cpu' }}
          path: paddle-ocr-v*-${{ matrix.package-target }}-*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release draft
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info
        id: get-release-info
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            RELEASE_NAME="Paddle OCR Plugin ${VERSION}"
            IS_MAIN_DRAFT="false"
          else
            VERSION="main"
            RELEASE_NAME="Paddle OCR Plugin main 草案 (${SHORT_SHA})"
            IS_MAIN_DRAFT="true"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "is_main_draft=${IS_MAIN_DRAFT}" >> $GITHUB_OUTPUT

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-files

          echo "=== Downloaded artifacts ==="
          find artifacts -type f -ls

          echo "=== Copy plugin ZIP files ==="
          find artifacts -type f -name "*.zip" -exec cp {} release-files/ \;

          echo "=== Release files ==="
          ls -lh release-files/

      - name: Create release draft and upload plugin ZIP files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-release-info.outputs.version }}
          name: ${{ steps.get-release-info.outputs.name }}
          body: |
            ## Paddle OCR 插件发布草稿

            ### 构建流水线
            - Workflow: `${{ github.workflow }}`
            - Run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            - Commit: `${{ github.sha }}`

            ### 检查清单
            - 确认 CPU 和 GPU 版本的 Windows x64 ZIP 都已上传。
            - 抽查一个 ZIP，确认包含 `manifest.json`、`bin/`、`models/ppocr-v5-mobile/` 和管理页 JS。
            - 如为正式版本，确认版本号与 `manifest.json`、`package.json` 保持一致后再发布。

            ### 发布包
            本次流水线会上传以下平台的离线插件 ZIP：

            - `paddle-ocr-v*-windows-x64-cpu.zip` (内置 CPU 版 ONNX Runtime，体积小)
            - `paddle-ocr-v*-windows-x64-gpu.zip` (内置 GPU 版 ONNX Runtime，支持 CUDA 12 加速)

            ### 使用说明
            在 AIO Hub 插件管理页面选择本机平台对应的 ZIP 手动导入。发布包已包含 PaddleOCR sidecar、管理页、manifest 和 PP-OCRv5 Mobile 模型文件。

          draft: true
          prerelease: ${{ steps.get-release-info.outputs.is_main_draft == 'true' || contains(steps.get-release-info.outputs.version, 'beta') || contains(steps.get-release-info.outputs.version, 'alpha') || contains(steps.get-release-info.outputs.version, 'dev') }}
          make_latest: ${{ steps.get-release-info.outputs.is_main_draft != 'true' }}
          files: release-files/*.zip

