name: Test Build (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  MODEL_BUNDLE_URL: https://github.com/miaotouy/aiohub-paddle-ocr/releases/download/modelsv1/aiohub-paddle-ocr-models-ppocr-v5-mobile-v1.tar.gz
  MODEL_BUNDLE_SHA256: 2615c35c0aa33bb4ea21ec8a1de6a33cc8823d68d524f36f0e3cbb17777d63de

jobs:
  build:
    name: Test Build ${{ matrix.package-target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-target: windows-x64
            rust-target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: bun install

      - name: Download and verify OCR models
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Invoke-WebRequest -Uri $env:MODEL_BUNDLE_URL -OutFile model-bundle.tar.gz

          $actualHash = (Get-FileHash -Algorithm SHA256 -Path model-bundle.tar.gz).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:MODEL_BUNDLE_SHA256) {
            throw "Model bundle SHA256 mismatch. Expected $env:MODEL_BUNDLE_SHA256, got $actualHash."
          }

          tar -xzf model-bundle.tar.gz

          if (-not (Test-Path -Path "models/ppocr-v5-mobile")) {
            throw "Model bundle did not extract models/ppocr-v5-mobile."
          }

          if (-not (Test-Path -Path "SHA256SUMS.txt")) {
            throw "Model bundle is missing SHA256SUMS.txt."
          }

          $badFiles = @()
          foreach ($line in Get-Content -Path "SHA256SUMS.txt") {
            if ([string]::IsNullOrWhiteSpace($line)) {
              continue
            }

            $parts = $line -split "\s+", 2
            if ($parts.Count -ne 2) {
              $badFiles += "invalid checksum line: $line"
              continue
            }

            $expected = $parts[0]
            $relativePath = $parts[1]
            $localPath = $relativePath -replace "/", [System.IO.Path]::DirectorySeparatorChar

            if (-not (Test-Path -LiteralPath $localPath)) {
              $badFiles += "missing: $relativePath"
              continue
            }

            $fileHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $localPath).Hash.ToLowerInvariant()
            if ($fileHash -ne $expected) {
              $badFiles += "mismatch: $relativePath"
            }
          }

          if ($badFiles.Count -gt 0) {
            $badFiles | ForEach-Object { Write-Error $_ }
            throw "Model file checksum verification failed."
          }

          Get-ChildItem -Path "models/ppocr-v5-mobile" -File

      - name: Download ONNX Runtime libraries
        shell: pwsh
        run: |
          bun run download-ort --variant=cpu
          bun run download-ort --variant=gpu-cuda12
          bun run download-ort --variant=gpu-cuda13

      - name: Package plugin
        shell: pwsh
        run: |
          bun build.js --release --package --target=${{ matrix.package-target }} --variant=all

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddle-ocr-test-build-${{ matrix.package-target }}
          path: aiohub-paddle-ocr-v*-${{ matrix.package-target }}-*.zip
          if-no-files-found: error